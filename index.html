<!DOCTYPE html>
<html>
<head>
  <title>Web3 Task Tracker</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    input {
      padding: 10px;
      width: 60%;
    }
    button {
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
    }
    li {
      margin: 10px;
    }
  </style>
</head>
<body>

<h1>🚀 Web3 Task Tracker</h1>

<input id="taskInput" placeholder="Enter task..." />
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

<script>
function addTask() {
  let input = document.getElementById("taskInput");
  let task = input.value;

  if (task === "") return;

  let li = document.createElement("li");
  li.innerHTML = task + " <button onclick='this.parentElement.remove()'>❌</button>";

  document.getElementById("taskList").appendChild(li);
  input.value = "";
}
</script>

</body>
</html>
