<!DOCTYPE html>
<html>
<head>
  <title>Web3 Task Tracker</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 40px;
    }

    input {
      padding: 10px;
      width: 220px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 5px;
    }

    .addBtn {
      background: #22c55e;
      color: white;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      margin: 10px auto;
      padding: 12px;
      width: 300px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .editBtn {
      background: orange;
      color: black;
      margin-left: 5px;
    }

    .deleteBtn {
      background: red;
      color: white;
      margin-left: 5px;
    }
  </style>
</head>

<body>

  <h1><span class="logo">🚀</span> Web3 Task Tracker</h1>

  <input id="taskInput" placeholder="Enter task..." />
  <button class="addBtn" onclick="addTask()">Add</button>

  <ul id="taskList"></ul>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function renderTasks() {
      let list = document.getElementById("taskList");
      list.innerHTML = "";

      tasks.forEach((task, index) => {
        let li = document.createElement("li");

        li.innerHTML = `
          <span>${task}</span>
          <div>
            <button class="editBtn" onclick="editTask(${index})">Edit</button>
            <button class="deleteBtn" onclick="deleteTask(${index})">Delete</button>
          </div>
        `;

        list.appendChild(li);
      });
    }

    function addTask() {
      let input = document.getElementById("taskInput");

      if (input.value.trim() === "") return;

      tasks.push(input.value.trim());
      localStorage.setItem("tasks", JSON.stringify(tasks));

      input.value = "";
      renderTasks();
    }

    function editTask(index) {
      let newTask = prompt("Edit your task:", tasks[index]);

      if (!newTask || newTask.trim() === "") return;

      tasks[index] = newTask.trim();
      localStorage.setItem("tasks", JSON.stringify(tasks));

      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      localStorage.setItem("tasks", JSON.stringify(tasks));

      renderTasks();
    }

    renderTasks();
  </script>

</body>
</html>
