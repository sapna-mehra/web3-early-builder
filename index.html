<!DOCTYPE html>
<html>
<head>
  <title>Web3 Task Tracker (Web3 Edition)</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .addBtn { background: #22c55e; color: white; }
    .editBtn { background: orange; }
    .deleteBtn { background: red; color: white; }
    .walletBtn { background: purple; color: white; }

    input {
      padding: 10px;
      width: 200px;
      border-radius: 5px;
      border: none;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      margin: 10px auto;
      padding: 12px;
      width: 300px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
    }

    #walletAddress {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <h1>🚀 Web3 Task Tracker</h1>

  <button class="walletBtn" onclick="connectWallet()">🦊 Connect MetaMask</button>
  <p id="walletAddress">Not connected</p>

  <br><br>

  <input id="taskInput" placeholder="Enter task..." />
  <button class="addBtn" onclick="addTask()">Add</button>

  <ul id="taskList"></ul>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function renderTasks() {
      let list = document.getElementById("taskList");
      list.innerHTML = "";

      tasks.forEach((task, index) => {
        let li = document.createElement("li");

        li.innerHTML = `
          <span>${task}</span>
          <div>
            <button class="editBtn" onclick="editTask(${index})">Edit</button>
            <button class="deleteBtn" onclick="deleteTask(${index})">Delete</button>
          </div>
        `;

        list.appendChild(li);
      });
    }

    function addTask() {
      let input = document.getElementById("taskInput");
      if (input.value.trim() === "") return;

      tasks.push(input.value.trim());
      localStorage.setItem("tasks", JSON.stringify(tasks));

      input.value = "";
      renderTasks();
    }

    function editTask(index) {
      let newTask = prompt("Edit task:", tasks[index]);
      if (!newTask) return;

      tasks[index] = newTask;
      localStorage.setItem("tasks", JSON.stringify(tasks));
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      localStorage.setItem("tasks", JSON.stringify(tasks));
      renderTasks();
    }

    async function connectWallet() {
      if (typeof window.ethereum !== "undefined") {
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        document.getElementById("walletAddress").innerText = "Connected: " + accounts[0];
      } else {
        alert("MetaMask not installed!");
      }
    }

    renderTasks();
  </script>

</body>
</html>
