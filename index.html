<!DOCTYPE html>
<html>
<head>
  <title>Web3 Task Tracker</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 200px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 5px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .editBtn {
      background: orange;
      color: black;
    }
  </style>
</head>

<body>

  <h1>🚀 Web3 Task Tracker</h1>

  <input id="taskInput" placeholder="Enter task..." />
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function renderTasks() {
      let list = document.getElementById("taskList");
      list.innerHTML = "";

      tasks.forEach((task, index) => {
        let li = document.createElement("li");

        li.innerHTML = `
          <span>${task}</span>
          <button class="editBtn" onclick="editTask(${index})">✏️</button>
        `;

        list.appendChild(li);
      });
    }

    function addTask() {
      let input = document.getElementById("taskInput");

      if (input.value.trim() === "") return;

      tasks.push(input.value.trim());
      localStorage.setItem("tasks", JSON.stringify(tasks));

      input.value = "";
      renderTasks();
    }

    function editTask(index) {
      let newTask = prompt("Edit your task:", tasks[index]);

      if (!newTask || newTask.trim() === "") return;

      tasks[index] = newTask.trim();
      localStorage.setItem("tasks", JSON.stringify(tasks));

      renderTasks();
    }

    renderTasks();
  </script>

</body>
</html>
