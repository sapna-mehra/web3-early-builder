<!DOCTYPE html>
<html>
<head>
  <title>Shelby Data Stream Dashboard</title>
  <style>
    body {
      background: #0a0a0a;
      color: #00ffcc;
      font-family: monospace;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #00ffaa;
    }

    .box {
      border: 1px solid #00ffaa33;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      background: #111;
    }

    button {
      background: #00ffaa;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    .log {
      margin-top: 20px;
      background: black;
      padding: 10px;
      height: 200px;
      overflow-y: auto;
      border-radius: 5px;
      font-size: 13px;
    }

    .progress {
      margin-top: 10px;
      height: 8px;
      background: #222;
      border-radius: 5px;
    }

    .bar {
      height: 8px;
      width: 0%;
      background: #00ffaa;
    }
  </style>
</head>
<body>

<h1>🚀 Shelby Data Stream</h1>

<div class="box">
  <input type="file" />
  <br><br>
  <button onclick="start()">Start Streaming</button>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
function log(msg) {
  let logBox = document.getElementById("log");
  logBox.innerHTML += msg + "<br>";
  logBox.scrollTop = logBox.scrollHeight;
}

function start() {
  let bar = document.getElementById("bar");
  let progress = 0;

  log("Initializing Shelby stream...");
  
  let steps = [
    "Encoding data into chunks...",
    "Applying erasure coding...",
    "Connecting to Shelby RPC...",
    "Uploading chunks...",
    "Verifying data integrity...",
    "Stream complete ✅"
  ];

  let i = 0;

  let interval = setInterval(() => {
    if (progress >= 100) {
      clearInterval(interval);
      return;
    }

    progress += 5;
    bar.style.width = progress + "%";

    if (progress % 20 === 0 && i < steps.length) {
      log(">> " + steps[i]);
      i++;
    }

  }, 200);
}
</script>

</body>
</html>
